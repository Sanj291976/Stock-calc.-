<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Calc</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background-color: #121212; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 5px; }
        .header { display: flex; justify-content: space-between; align-items: center; height: 6vh; padding: 0 5px; }
        .name-input { width: 100%; height: 6vh; padding: 5px; background: #1f2937; border: 1px solid #374151; border-radius: 6px; color: white; text-align: center; margin-bottom: 5px; }
        .cards-row { display: flex; gap: 4px; height: 11vh; margin-bottom: 5px; }
        .card { flex: 1; background: #111827; border: 2px solid #374151; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 0.8rem; }
        .card.active { background: #f3e8ff; border-color: #8b5cf6; color: #111827; }
        .total-box { background: #8b5cf6; border-radius: 8px; text-align: center; height: 8vh; display: flex; flex-direction: column; justify-content: center; margin-bottom: 5px; }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; flex: 1; }
        .key { background: #1f2937; border-radius: 6px; font-size: 1.3rem; display: flex; justify-content: center; align-items: center; border: 1px solid #374151; }
        .key:active { background: #8b5cf6; }
        .btn-row { display: flex; gap: 4px; height: 7vh; margin-top: 5px; }
        .btn { flex: 1; border: none; border-radius: 6px; color: white; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="header"><b style="color:#8b5cf6; font-size:0.9rem">STOCK CALC</b></div>
    <input type="text" id="userName" class="name-input" placeholder="Customer Name">
    <div class="cards-row">
        <div class="card active" id="card-Dal" onclick="selectItem('Dal')"><b>Dal</b><div style="font-size:0.6rem">₹58</div><div id="qty-Dal">0</div></div>
        <div class="card" id="card-Sugar" onclick="selectItem('Sugar')"><b>Sugar</b><div style="font-size:0.6rem">₹28</div><div id="qty-Sugar">0</div></div>
        <div class="card" id="card-Salt" onclick="selectItem('Salt')"><b>Salt</b><div style="font-size:0.6rem">₹8</div><div id="qty-Salt">0</div></div>
    </div>
    <div class="total-box"><div style="font-size:0.6rem">TOTAL</div><div id="grandTotal" style="font-size:1.5rem; font-weight:bold">₹0.00</div></div>
    <div class="numpad">
        <div class="key" onclick="press('7')">7</div><div class="key" onclick="press('8')">8</div><div class="key" onclick="press('9')">9</div>
        <div class="key" onclick="press('4')">4</div><div class="key" onclick="press('5')">5</div><div class="key" onclick="press('6')">6</div>
        <div class="key" onclick="press('1')">1</div><div class="key" onclick="press('2')">2</div><div class="key" onclick="press('3')">3</div>
        <div class="key" onclick="press('0')">0</div><div class="key" onclick="press('.')">.</div><div class="key" style="background:#f87171" onclick="press('DEL')">⌫</div>
    </div>
    <div class="btn-row">
        <button class="btn" style="background:#4b5563" onclick="location.reload()">Reset</button>
        <button class="btn" style="background:#10b981" onclick="share()">Share</button>
    </div>
    <script>
        let current = 'Dal'; let data = { 'Dal': '', 'Sugar': '', 'Salt': '' }; const prices = { 'Dal': 58, 'Sugar': 28, 'Salt': 8 };
        function selectItem(n) { current = n; document.querySelectorAll('.card').forEach(c => c.classList.remove('active')); document.getElementById(`card-${n}`).classList.add('active'); }
        function press(k) { if (k === 'DEL') data[current] = data[current].slice(0, -1); else if (k === '.' && data[current].includes('.')) return; else data[current] += k; update(); }
        function update() { let total = 0; for (let i in data) { let q = parseFloat(data[i]) || 0; document.getElementById(`qty-${i}`).innerText = data[i] || '0'; total += q * prices[i]; } document.getElementById('grandTotal').innerText = '₹' + total.toFixed(2); }
        function share() {
            const name = document.getElementById('userName').value || "Customer";
            let msg = `*RECEIPT*\nName: ${name}\n`;
            for (let i in data) { if (parseFloat(data[i]) > 0) msg += `${i}: ${data[i]}kg\n`; }
            msg += `*TOTAL: ${document.getElementById('grandTotal').innerText}*`;
            if (navigator.share) navigator.share({ text: msg }); else alert(msg);
        }
    </script>
</body>
</html>
